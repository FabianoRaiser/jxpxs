services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: filmes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filmes"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/filmes
      DATA_DIR: /data
      NODE_ENV: production
      EMBEDDINGS_BASE_URL: http://192.168.15.10:1234
      EMBEDDINGS_MODEL: text-embedding-nomic-embed-text-v2-moe
      EMBEDDINGS_DIM: "768"
    volumes:
      - ./database_filmes:/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - api

volumes:
  postgres_data:
